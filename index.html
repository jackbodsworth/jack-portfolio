<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Jack Bodsworth — Front-End Developer | Melbourne</title>
    <meta name="description" content="Jack Bodsworth is a Front-End Developer based in Melbourne, Australia, specialising in Vue.js, React, TypeScript, and design systems." />
    <meta name="author" content="Jack Bodsworth" />

    <!-- Open Graph -->
    <meta property="og:title" content="Jack Bodsworth — Front-End Developer" />
    <meta property="og:description" content="Building performant, accessible interfaces from Melbourne, Australia." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jackbodsworth.dev" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jack Bodsworth — Front-End Developer" />
    <meta name="twitter:description" content="Building performant, accessible interfaces from Melbourne, Australia." />

    <!--
      Fonts:
      - Cabinet Grotesk  → display headings (geometric, confident, modern)
      - DM Sans          → body copy (clean, legible, friendly)
      - DM Mono          → labels, code, metadata
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <!-- Cabinet Grotesk via Fontshare (free, high quality) -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,500,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Hidden form for Netlify Forms build-time detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
